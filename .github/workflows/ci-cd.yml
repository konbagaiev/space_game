name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
      - name: Client logic tests
        run: cd client && node --test
      - name: Install server deps
        run: cd server && npm ci
      - name: Server API tests
        run: cd server && npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Exposed so the optional steps below can gate on them (secrets can't be used directly in an `if:`).
      # Empty until the matching repo secret is set → that step is skipped.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      ASSETS_AWS_ACCESS_KEY_ID: ${{ secrets.ASSETS_AWS_ACCESS_KEY_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Sentry can associate commits with the release (set-commits --auto)
      # Ship-model asset pipeline (docs/plans/ship-model-pipeline.md): verify every pipeline model_url* in
      # the seed exists on S3 (deploy guard — no ghost ships), then pull the combat models into
      # client/assets/ships/ so the rsync + `docker compose build` below bake them into the image (runtime
      # stays same-origin). Uses a scoped READ-ONLY key (vega-assets-ci-read). No-op today (in-git primitives,
      # empty ships-combat/). Skipped if the secret is unset.
      - name: Set up Node (asset pipeline)
        if: ${{ env.ASSETS_AWS_ACCESS_KEY_ID != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '23'
      - name: Ship models — verify on S3 + pull combat models
        if: ${{ env.ASSETS_AWS_ACCESS_KEY_ID != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ASSETS_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ASSETS_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          node scripts/assets-check.mjs   # deploy guard: every pipeline model must exist on S3
          node scripts/assets-pull.mjs    # combat models → client/assets/ships/ (rsynced + baked next)
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Sync to server (keeps server-only .env)
        run: |
          rsync -az -e "ssh -i ~/.ssh/id_deploy" \
            --exclude node_modules --exclude .git --exclude server/data --exclude '*.log' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/projects/spacegame/"
      - name: Build & zero-downtime deploy (blue-green via docker rollout)
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -e
            cd /opt/projects/spacegame
            # ensure the docker-rollout CLI plugin is installed (idempotent)
            mkdir -p ~/.docker/cli-plugins
            if [ ! -x ~/.docker/cli-plugins/docker-rollout ]; then
              curl -fsSL https://raw.githubusercontent.com/Wowu/docker-rollout/master/docker-rollout \
                -o ~/.docker/cli-plugins/docker-rollout
              chmod +x ~/.docker/cli-plugins/docker-rollout
            fi
            TAG=$(echo ${{ github.sha }} | cut -c1-12)
            # bake the full git SHA into the image as SENTRY_RELEASE (artifact reports its own version)
            docker compose build --build-arg GIT_SHA=${{ github.sha }} app
            docker tag spacegame:latest spacegame:"$TAG"   # short-sha version tag for rollback
            # blue-green: new container up, wait until healthy (incl. migrations) + 10s so
            # Traefik registers it before the old one is removed -> zero downtime.
            docker rollout -w 10 app
            # keep the 3 newest version tags (current + 2 to roll back to); drop older + dangling
            docker images spacegame --format "{{.Tag}}" | grep -v "^latest$" | tail -n +4 \
              | xargs -r -I{} docker rmi -f spacegame:{} 2>/dev/null || true
            docker image prune -f
          '
      - name: Smoke check
        # Retry: a rollout can briefly 502 while Traefik swaps to the new container (e.g. a
        # slower first-time migration), and on the first cutover Traefik needs a few seconds to
        # issue the vega.tenony.com cert via ACME. Verify the new canonical host, then fall back
        # to the legacy host (same container) so a still-pending cert doesn't fail a healthy deploy.
        run: |
          for i in $(seq 1 10); do
            if curl -fsS --max-time 10 https://vega.tenony.com/api/health; then
              echo " ✓ vega.tenony.com healthy (attempt $i)"; exit 0
            fi
            echo "vega attempt $i failed; retrying in 3s..."; sleep 3
          done
          echo "vega.tenony.com not ready; checking legacy host space.bagaiev.com ..."
          if curl -fsS --max-time 10 https://space.bagaiev.com/api/health; then
            echo " ✓ space.bagaiev.com healthy (vega cert may still be issuing)"; exit 0
          fi
          echo "smoke check failed: neither host healthy" >&2; exit 1

      - name: Register Sentry release + commits
        # Optional: runs only once the SENTRY_AUTH_TOKEN (+ SENTRY_ORG/SENTRY_PROJECT) repo secrets
        # exist. version = the full git SHA, matching SENTRY_RELEASE baked into the image, so events
        # group under it. set-commits --auto needs full history (fetch-depth: 0 above) for suspect
        # commits / regressions; a deploy is marked for the production environment.
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          VERSION="${{ github.sha }}"
          npx --yes @sentry/cli@^2 releases new "$VERSION"
          npx --yes @sentry/cli@^2 releases set-commits "$VERSION" --auto
          npx --yes @sentry/cli@^2 releases finalize "$VERSION"
          npx --yes @sentry/cli@^2 releases deploys "$VERSION" new -e production
