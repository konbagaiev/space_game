name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
      - name: Client logic tests
        run: cd client && node --test
      - name: Install server deps
        run: cd server && npm ci
      - name: Server API tests
        run: cd server && npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Sync to server (keeps server-only .env)
        run: |
          rsync -az -e "ssh -i ~/.ssh/id_deploy" \
            --exclude node_modules --exclude .git --exclude server/data --exclude '*.log' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/projects/spacegame/"
      - name: Build & restart container
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /opt/projects/spacegame && docker compose up -d --build && docker image prune -f"
      - name: Smoke check
        run: |
          sleep 5
          curl -fsS --max-time 20 https://space.bagaiev.com/api/health
