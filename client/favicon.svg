<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Favicon: the game's signature blue planet with a real day/night terminator and a small
       moon, on a deep-space tile. Colors echo the game (background #05060d). -->
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#101a33"/>
      <stop offset="100%" stop-color="#05060d"/>
    </radialGradient>
    <!-- day side (upper-left) fading to the night side: a soft terminator from a side light -->
    <radialGradient id="planet" cx="34%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#bfe0ff"/>
      <stop offset="42%" stop-color="#5aa0e0"/>
      <stop offset="70%" stop-color="#2a5e9a"/>
      <stop offset="100%" stop-color="#0b1f3a"/>
    </radialGradient>
    <radialGradient id="moon" cx="34%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#e7ecf5"/>
      <stop offset="55%" stop-color="#aab4c6"/>
      <stop offset="100%" stop-color="#2c3344"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#space)"/>

  <!-- stars -->
  <g fill="#cdd8f0">
    <circle cx="51" cy="44" r="1.4"/>
    <circle cx="44" cy="54" r="1.1"/>
    <circle cx="13" cy="14" r="1.3"/>
    <circle cx="56" cy="30" r="1"/>
    <circle cx="9" cy="40" r="1"/>
    <circle cx="20" cy="55" r="1"/>
  </g>

  <!-- planet with day/night terminator -->
  <circle cx="27" cy="34" r="19" fill="url(#planet)"/>

  <!-- a small moon -->
  <circle cx="50" cy="15" r="6.5" fill="url(#moon)"/>
</svg>
