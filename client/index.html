<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Space Ninjas</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060d; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 14px 18px;
    font-family: "Segoe UI", system-ui, sans-serif;
    color: #cfe6ff; pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
    text-shadow: 0 0 6px rgba(0,0,0,.8);
  }
  #hud .right { text-align: right; }
  .bigval { font-size: 26px; font-weight: 700; }
  .label { font-size: 12px; letter-spacing: 1px; opacity: .6; text-transform: uppercase; }
  #hpbar { width: 220px; height: 14px; border: 1px solid #3a6ea5; border-radius: 7px; overflow: hidden; margin-top: 4px; background: rgba(0,0,0,.4); }
  #hpfill { height: 100%; width: 100%; background: linear-gradient(90deg,#36d1dc,#5b86e5); transition: width .15s; }
  #hppct { margin-top: 4px; font: 700 14px system-ui, sans-serif; color: #cfe6ff; }
  #help {
    position: fixed; bottom: 14px; left: 18px;
    font-family: system-ui, sans-serif; font-size: 13px; color: #7f93b5;
    pointer-events: none; line-height: 1.6;
  }
  #help b { color: #cfe6ff; }
  #overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: rgba(5,6,13,.82); color: #e8f1ff;
    font-family: system-ui, sans-serif; text-align: center;
  }
  #overlay h1 { font-size: 44px; margin-bottom: 8px; }
  #overlay p { opacity: .75; margin-bottom: 24px; }
  #overlay button {
    pointer-events: auto; cursor: pointer;
    padding: 12px 30px; font-size: 16px; border: 0; border-radius: 8px;
    background: linear-gradient(90deg,#36d1dc,#5b86e5); color: #02101f; font-weight: 700;
  }
  /* Perf overlay (load) */
  /* Game title (wordmark), centered at the very top */
  #gametitle {
    position: fixed; top: 9px; left: 50%; transform: translateX(-50%);
    font-family: "Segoe UI", system-ui, sans-serif; font-weight: 700;
    font-size: 16px; letter-spacing: 4px; text-transform: uppercase;
    color: #cfe0ff; opacity: .92; pointer-events: none; white-space: nowrap;
    text-shadow: 0 0 10px rgba(90,140,230,.6), 0 0 2px rgba(0,0,0,.9);
  }
  #perf {
    position: fixed; top: 34px; left: 50%; transform: translateX(-50%);
    font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    color: #9fe8b0; background: rgba(0,0,0,.45); padding: 4px 10px; border-radius: 6px;
    pointer-events: none; white-space: nowrap; letter-spacing: .3px;
  }
  /* Touch controls (touch devices only) */
  #touch { position: fixed; inset: 0; display: none; pointer-events: none; touch-action: none; z-index: 5; }
  #touch.on { display: block; }
  #stick-zone { position: absolute; left: 0; top: 0; width: 58%; height: 100%; pointer-events: auto; }
  #overlay { z-index: 10; } /* "Game over"/"Restart" screen - above touch controls */
  #stick-base {
    position: absolute; width: 120px; height: 120px; margin: -60px 0 0 -60px;
    border: 2px solid rgba(120,170,255,.5); border-radius: 50%;
    background: rgba(40,70,120,.18); display: none;
  }
  #stick-knob {
    position: absolute; width: 56px; height: 56px; margin: -28px 0 0 -28px;
    border-radius: 50%; background: rgba(120,170,255,.55); display: none;
  }
  #fire-btn {
    position: absolute; right: 28px; bottom: 38px; width: 96px; height: 96px;
    margin: 0; border-radius: 50%; pointer-events: auto;
    background: radial-gradient(circle at 50% 40%, rgba(255,140,90,.85), rgba(200,60,40,.7));
    border: 2px solid rgba(255,180,140,.8);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font: 700 16px system-ui, sans-serif; user-select: none;
  }
  #fire-btn:active { filter: brightness(1.3); }
  /* Rocket button = reload indicator (circle fills as it reloads). Shown on PC and mobile. */
  #rocket-btn {
    position: fixed; right: 28px; bottom: 40px; width: 84px; height: 84px;
    border-radius: 50%; pointer-events: auto; user-select: none; overflow: hidden;
    border: 2px solid rgba(255,180,120,.55); background: rgba(20,16,12,.5);
    display: flex; align-items: center; justify-content: center;
  }
  #rocket-fill { position: absolute; inset: 0; border-radius: 50%; }
  #rocket-btn .rb-icon { position: relative; z-index: 1; font-size: 34px; text-shadow: 0 0 5px #000; }
  #rocket-btn.ready { border-color: #77ee77; box-shadow: 0 0 12px rgba(110,238,110,.5); }
  #rocket-btn:active { filter: brightness(1.25); }
</style>

<body>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { deriveDrive } from './src/components.js'; // pure derivation; ship/weapon DATA now comes from the DB
import { headingToDir, shortestAngleDelta, steerToward, enemyThrustFactor } from './src/steering.js';

// ---------- Base scene ----------
const scene = new THREE.Scene();
scene.background = null; // background is drawn by the sky scene (first pass); combat is transparent on top
scene.fog = new THREE.Fog(0x05060d, 240, 600);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.info.autoReset = false; // count load across both render passes
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 900);
const CAM_OFFSET = new THREE.Vector3(0, 110, 26); // fixed camera offset from the ship

// === TWO INDEPENDENT LIGHTING SETUPS via two render passes ===
// The sky (planet, moons, stars) is drawn by a separate scene with its own light,
// combat by the main scene with its own. Each scene sees only its own sources,
// so lighting is real and does not "leak" between groups.
renderer.autoClear = false;

// COMBAT LIGHT (main scene) - exactly as before
scene.add(new THREE.AmbientLight(0x405070, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(30, 60, 20);
scene.add(sun);

// SKY SCENE with its own light (real side source -> real terminator)
const skyScene = new THREE.Scene();
skyScene.background = new THREE.Color(0x05060d); // the space background is drawn by the sky scene itself
skyScene.add(new THREE.AmbientLight(0x3a506e, 0.7)); // night-side fill light (brighter)
const skySun = new THREE.DirectionalLight(0xfff2e0, 3.4);
skySun.position.set(170, -80, 40); // from the side -> terminator across the visible disc
skyScene.add(skySun);

// ---------- Arena ----------
// There is no visible floor - ships hover in open space.
// ARENA only defines invisible boundaries that ships cannot fly past.
const ARENA = 240; // half-size of the square arena (x4)

// ---------- Starry sky ----------
function makeStars(count, radius) {
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const c = new THREE.Color();
  for (let i = 0; i < count; i++) {
    // evenly over the sphere around the arena
    const u = Math.random() * 2 - 1;
    const theta = Math.random() * Math.PI * 2;
    const r = Math.sqrt(1 - u * u);
    const dist = radius * (0.7 + Math.random() * 0.3);
    positions[i * 3]     = Math.cos(theta) * r * dist;
    positions[i * 3 + 1] = u * dist; // across the whole sphere, including below the platform
    positions[i * 3 + 2] = Math.sin(theta) * r * dist;
    // slight hue variation (bluish <-> warm) + VARYING BRIGHTNESS.
    // An exponent >1 yields many dim stars and a few bright ones - like a real sky.
    c.setHSL(0.55 + Math.random() * 0.12, 0.25 + Math.random() * 0.3, 0.7);
    const b = 0.15 + Math.pow(Math.random(), 2.2) * 0.85;
    colors[i * 3] = c.r * b; colors[i * 3 + 1] = c.g * b; colors[i * 3 + 2] = c.b * b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: 1.4,
    sizeAttenuation: false, // stars are the same size regardless of distance
    vertexColors: true,
    transparent: false,     // opaque -> drawn in the pass before the planet
    fog: false,             // fog must not dim the stars
    depthTest: false,       // pure backdrop - planet/moons always occlude them
    depthWrite: false,
  });
  return new THREE.Points(geo, mat);
}
const stars = makeStars(2500, 400);
stars.renderOrder = -1; // draw stars first, before the planet and moons
skyScene.add(stars);

// ---------- Planet with moons ----------
// The camera looks almost straight down, so the "sky" is visible only near the top
// edge of the screen (the -Z direction). That is where we place the planet as a distant background.
const sky = new THREE.Group();
skyScene.add(sky);

const PLANET_POS = new THREE.Vector3(-150, -285, -110);

// Minimal procedural surface: a blue ocean world with depth variation and soft white clouds.
// Drawn once onto a canvas (no asset files) and used as the planet's color map. The planet does
// not rotate (to keep the terminator consistent), so a static, baked texture is enough.
function makePlanetTexture() {
  const w = 1024, h = 512;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  ctx.fillStyle = '#5a82c0'; // ocean base = the planet's original water color (keep this brightness)
  ctx.fillRect(0, 0, w, h);

  // soft radial blob helper (fades to transparent at the rim)
  const blob = (x, y, r, color, alpha) => {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, color);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = alpha;
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  };

  // keep features in the central latitude band: at the poles an equirectangular map pinches
  // into visible streaks, so we avoid the top/bottom edges of the canvas.
  const yBand = () => h * (0.14 + Math.random() * 0.72);

  // ocean depth variation: gentle lighter shallows and slightly darker deeps, kept close to the
  // base so the planet's overall brightness stays the same (it shouldn't look darker/unlit).
  for (let i = 0; i < 26; i++) {
    blob(Math.random() * w, yBand(), 60 + Math.random() * 140,
      Math.random() < 0.5 ? '#7ba3da' : '#496ea6', 0.45);
  }
  // a few faint teal landmasses / reefs for variety
  for (let i = 0; i < 8; i++) {
    blob(Math.random() * w, yBand(), 50 + Math.random() * 90, '#4a8b86', 0.3);
  }
  // clouds: soft white wisps over the oceans
  for (let i = 0; i < 60; i++) {
    blob(Math.random() * w, yBand(), 25 + Math.random() * 70, '#eaf2ff', 0.18 + Math.random() * 0.22);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  return tex;
}

const planet = new THREE.Mesh(
  new THREE.SphereGeometry(60, 64, 64),
  new THREE.MeshStandardMaterial({ map: makePlanetTexture(), roughness: 0.9, metalness: 0.0, fog: false })
);
planet.position.copy(PLANET_POS);
sky.add(planet);

// atmospheric rim (glow along the edge)
const halo = new THREE.Mesh(
  new THREE.SphereGeometry(64, 48, 48),
  new THREE.MeshBasicMaterial({
    color: 0x6fa8ff, transparent: true, opacity: 0.13,
    side: THREE.BackSide, fog: false,
  })
);
halo.position.copy(PLANET_POS);
sky.add(halo);

// Simple procedural moon surface: the base rock color with a scatter of craters (a darker floor
// plus a lighter rim ring) and faint maria. Albedo only (no directional shading baked in) so it
// doesn't fight the real sky-scene light. Drawn once onto a canvas, no asset files.
function makeMoonTexture(baseHex) {
  const w = 512, h = 256;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  const br = (baseHex >> 16) & 255, bg = (baseHex >> 8) & 255, bb = baseHex & 255;
  const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
  const shade = (f) => `rgb(${clamp(br * f)},${clamp(bg * f)},${clamp(bb * f)})`;
  // keep features off the poles (equirectangular pinching)
  const yBand = () => h * (0.16 + Math.random() * 0.68);

  ctx.fillStyle = shade(1);
  ctx.fillRect(0, 0, w, h);

  // faint maria (large soft light/dark patches)
  for (let i = 0; i < 10; i++) {
    const x = Math.random() * w, y = yBand(), r = 40 + Math.random() * 70;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, Math.random() < 0.5 ? shade(0.86) : shade(1.12));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.4; ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // craters: darker floor + lighter rim ring
  for (let i = 0; i < 26; i++) {
    const x = Math.random() * w, y = yBand(), r = 5 + Math.random() * 16;
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = shade(0.7);
    ctx.beginPath(); ctx.arc(x, y, r * 0.78, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = shade(1.3);
    ctx.lineWidth = Math.max(1, r * 0.16);
    ctx.beginPath(); ctx.arc(x, y, r * 0.9, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  return tex;
}

// moons: ORBIT the planet (only position changes). Lit by the same
// real sky-scene light as the planet -> terminators are consistent.
const moons = [];
function makeMoon(radius, color, orbitR, tilt, speed) {
  const geo = new THREE.SphereGeometry(radius, 32, 32);
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ map: makeMoonTexture(color), roughness: 1.0, metalness: 0.0, fog: false }));
  sky.add(mesh);
  const m = { mesh, orbitR, tilt, speed, angle: Math.random() * Math.PI * 2 };
  moons.push(m);
  return m;
}
makeMoon(11, 0xb9b2a6, 96, 0.5, 0.0625);
makeMoon(7, 0x8f9aa6, 136, -0.35, -0.04);

// position of a moon on a tilted orbit around the planet (the body itself does not rotate)
function updateMoons(dt) {
  for (const m of moons) {
    m.angle += m.speed * dt;
    const px = Math.cos(m.angle) * m.orbitR;
    const pz = Math.sin(m.angle) * m.orbitR;
    m.mesh.position.set(
      PLANET_POS.x + px,
      PLANET_POS.y - pz * Math.sin(m.tilt),
      PLANET_POS.z + pz * Math.cos(m.tilt)
    );
  }
}

// ---------- Parallax asteroid layer (speed reference) ----------
// A layer of small rocks BEHIND the combat plane, in WORLD coordinates (not tied
// to the camera). So while flying they rush past and give a sense of speed -
// unlike the distant stars, which are stuck to the camera. 1 InstancedMesh = 1 draw call.
const ROCK_COUNT = 500;
const ROCK_SPREAD = ARENA + 200; // scattered everywhere (and a bit past the edges)
const rocks = new THREE.InstancedMesh(
  new THREE.IcosahedronGeometry(1, 0), // low-poly rock
  new THREE.MeshStandardMaterial({ color: 0x6b6f78, roughness: 1.0, metalness: 0.05, flatShading: true }),
  ROCK_COUNT
);
{
  const m4 = new THREE.Matrix4();
  const pos = new THREE.Vector3();
  const quat = new THREE.Quaternion();
  const eul = new THREE.Euler();
  const scl = new THREE.Vector3();
  for (let i = 0; i < ROCK_COUNT; i++) {
    pos.set(
      (Math.random() * 2 - 1) * ROCK_SPREAD,
      -6 - Math.random() * 10, // layer BEHIND (below) the combat plane
      (Math.random() * 2 - 1) * ROCK_SPREAD
    );
    eul.set(Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28);
    quat.setFromEuler(eul);
    const s = 0.4 + Math.random() * 0.9; // small pebbles, but noticeably larger than stars
    scl.set(s, s, s);
    m4.compose(pos, quat, scl);
    rocks.setMatrixAt(i, m4);
  }
  rocks.instanceMatrix.needsUpdate = true;
}
scene.add(rocks);

// ---------- Ship factory ----------
// A ship's 3D model comes from the DB (ships.model_url): null = the built-in primitive ship.
// makeShip builds the primitive immediately (shown while a model loads, and as a fallback), then
// applyShipModel swaps in the .glb. The exported assets bake the color in, so we load with tint off.
// (For a model whose nose isn't +Z, or that needs runtime tinting, pass {url, yaw, tint, scaleMul} —
// see assets/README.md.)
const modelSpec = (url) => (url ? { url, tint: false } : null);

const gltfLoader = new GLTFLoader();
const SHIP_MODEL_LEN = 3.4; // auto-normalize a model's longest axis to ~ the primitive ship's footprint

// Load a .glb and swap it in for the placeholder primitive, keeping the SAME group object (all
// gameplay logic keeps referencing it). The model is auto-centered, scaled to a consistent size,
// optionally recolored, and oriented. Falls back to the primitive on error.
function applyShipModel(group, spec, color) {
  const cfg = (typeof spec === 'string') ? { url: spec } : spec;
  const { url, yaw = 0, tint = true, scaleMul = 1 } = cfg;
  gltfLoader.load(url, (gltf) => {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const s = (SHIP_MODEL_LEN / (Math.max(size.x, size.y, size.z) || 1)) * scaleMul;
    model.scale.setScalar(s);
    model.position.copy(center).multiplyScalar(-s); // recenter at the group origin
    if (tint) model.traverse((o) => {
      if (o.isMesh && o.material) {
        o.material = Array.isArray(o.material) ? o.material.map((m) => m.clone()) : o.material.clone();
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        mats.forEach((m) => m.color && m.color.set(color));
      }
    });
    const pivot = new THREE.Group(); // rotate the centered model without disturbing its centering
    pivot.rotation.y = yaw;
    pivot.add(model);
    for (let i = group.children.length - 1; i >= 0; i--) { // drop the placeholder primitive
      const c = group.children[i];
      group.remove(c);
      c.geometry?.dispose?.();
      c.material?.dispose?.();
    }
    group.add(pivot);
  }, undefined, (err) => console.warn('Ship model failed to load, keeping primitive:', url, err));
}

function makeShip(color, model = null) {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.4, roughness: 0.5 });
  // hull (nose points in +Z)
  const body = new THREE.Mesh(new THREE.ConeGeometry(0.9, 3.2, 12), mat);
  body.rotation.x = Math.PI / 2;
  g.add(body);
  // wings
  const wing = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.25, 1.0), mat);
  wing.position.z = -0.4;
  g.add(wing);
  // engine glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.45, 10, 10),
    new THREE.MeshBasicMaterial({ color })
  );
  glow.position.z = -1.6;
  g.add(glow);
  g.position.y = 0.6;
  g.scale.setScalar(1.8); // larger - the arena is far away, otherwise ships look tiny
  if (model) applyShipModel(g, model, color); // optionally replace the primitive with a .glb
  return g;
}

// ---------- Projectiles ----------
const bullets = [];
const bulletGeo = new THREE.SphereGeometry(0.28, 8, 8);

function spawnBullet(from, dir, weapon, fromPlayer, shooterVel) {
  const mat = new THREE.MeshBasicMaterial({ color: weapon.projectileColor });
  const m = new THREE.Mesh(bulletGeo, mat);
  m.position.copy(from);
  scene.add(m);
  // velocity = projectile speed along the nose + ship velocity (inherited)
  const vel = dir.clone().normalize().multiplyScalar(weapon.projectileSpeed);
  if (shooterVel) vel.add(shooterVel);
  // despawn by distance traveled (maxRange), not time
  bullets.push({ mesh: m, vel, traveled: 0, maxRange: weapon.maxRange ?? 88, fromPlayer, damage: weapon.power });
}

// ---------- Micro-explosions at the impact point ----------
const explosions = [];
const EXPLOSION_LIFE = 0.16; // very short flash, sec
const explosionGeo = new THREE.SphereGeometry(1, 10, 10);

function spawnExplosion(pos, maxScale = 3, life = EXPLOSION_LIFE, color = 0xffb050) {
  // glowing fiery sphere: additive blending + fade-out (life/color tunable so the same
  // primitive serves a quick hit-flash and a slower, layered ship-death fireball).
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false, fog: false,
  });
  const m = new THREE.Mesh(explosionGeo, mat);
  m.position.copy(pos);
  m.scale.setScalar(0.6);
  scene.add(m);
  explosions.push({ mesh: m, life, maxLife: life, maxScale });
}

// ---------- Ship destruction: a big, colorful burst (layered fireball + sparks + shockwave) ----------
// Much louder than the hit-flash: stacked fireballs (white-hot core -> exhaust-colored glow ->
// orange -> red cloud), a radial spray of sparks, and a flat shockwave ring on the arena plane.
// Scaled by the ship's size (sizeScale) and tinted by its engine's exhaust color.
const sparks = [];
const sparkGeo = new THREE.SphereGeometry(1, 6, 6);
// warm ember palette; a few sparks take the engine's exhaust color for variety
const SPARK_COLORS = [0xffffff, 0xfff0a0, 0xffd040, 0xff8030, 0xff3020];
const shockwaves = [];
const shockGeo = new THREE.RingGeometry(0.78, 1, 28); // unit ring, scaled up as it expands

function spawnShipExplosion(pos, exhaustColor = 0xff8030, sizeScale = 1) {
  const s = sizeScale; // scales every spatial dimension to the ship's size
  // Layered fireball: each layer bigger, dimmer-colored and slower than the last. The
  // second layer glows in the engine's exhaust color (the destroyed engine's signature).
  spawnExplosion(pos, 5 * s, 1.05, 0xffffff);     // white-hot flash core
  spawnExplosion(pos, 8 * s, 1.8, exhaustColor);  // exhaust-colored glow (engine signature)
  spawnExplosion(pos, 11 * s, 2.55, 0xffc040);    // orange fireball
  spawnExplosion(pos, 14 * s, 3.75, 0xff3a18);    // red outer cloud

  // Radial spark spray: warm embers + a few in the engine's exhaust color, flung outward.
  const N = 22;
  for (let i = 0; i < N; i++) {
    const col = (i % 4 === 0) ? exhaustColor : SPARK_COLORS[i % SPARK_COLORS.length];
    const mat = new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: 1,
      blending: THREE.AdditiveBlending, depthWrite: false, fog: false,
    });
    const m = new THREE.Mesh(sparkGeo, mat);
    m.position.copy(pos);
    const size = (0.35 + Math.random() * 0.5) * s;
    m.scale.setScalar(size);
    scene.add(m);
    const a = (i / N) * Math.PI * 2 + Math.random() * 0.5;       // spread around the circle
    const sp = (14 + Math.random() * 26) * s;                    // outward speed scales with size
    const vel = new THREE.Vector3(Math.cos(a) * sp, (Math.random() - 0.5) * 6 * s, Math.sin(a) * sp);
    sparks.push({ mesh: m, vel, life: 2.7 + Math.random() * 2.7, maxLife: 5.4, size });
  }

  // Shockwave: a flat additive ring (tinted by the exhaust color) that expands and fades.
  const ringMat = new THREE.MeshBasicMaterial({
    color: exhaustColor, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false, fog: false, side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(shockGeo, ringMat);
  ring.position.copy(pos); ring.position.y = 0.6;
  ring.rotation.x = -Math.PI / 2; // lay it flat on the arena
  scene.add(ring);
  shockwaves.push({ mesh: ring, life: 2.4, maxLife: 2.4, maxScale: 22 * s });
}

// ---------- Engine trail (exhaust is part of the engine) ----------
const trail = [];
const trailGeo = new THREE.SphereGeometry(1, 6, 6); // unit sphere, scale set by the exhaust

function spawnTrail(pos, fwd, shipVel, exhaust) {
  // glowing exhaust particle: additive, fades out.
  // Start velocity = ship velocity + ejection backward along the nozzle (-fwd).
  const mat = new THREE.MeshBasicMaterial({
    color: exhaust.color, transparent: true, opacity: 0.85,
    blending: THREE.AdditiveBlending, depthWrite: false, fog: false,
  });
  const m = new THREE.Mesh(trailGeo, mat);
  m.position.copy(pos);
  m.scale.setScalar(exhaust.size);
  scene.add(m);
  const vel = shipVel.clone().addScaledVector(fwd, -exhaust.speed);
  trail.push({ mesh: m, vel, life: exhaust.life, maxLife: exhaust.life, baseSize: exhaust.size });
}

// Emit one exhaust puff from a ship's nozzle. Shared by every ship (player and enemies):
// the nozzle sits behind the hull (scaled by the ship's size) with a little width spread.
function emitExhaust(shipPos, fwd, shipVel, exhaust, sizeScale = 1) {
  const pos = shipPos.clone().addScaledVector(fwd, -2.6 * sizeScale);
  pos.x += (Math.random() - 0.5) * exhaust.spread;
  pos.z += (Math.random() - 0.5) * exhaust.spread;
  spawnTrail(pos, fwd, shipVel, exhaust);
}

// ---------- Rockets (homing) ----------
const rockets = [];
const rocketGeo = new THREE.ConeGeometry(0.6, 2.4, 8); // nose in +Z (like the ship)

// Find the nearest enemy in the front sector [fwd +/- halfAngle].
function findTargetInSector(pos, fwd, halfAngle) {
  let best = null, bestDist = Infinity;
  for (const e of enemies) {
    const to = e.mesh.position.clone().sub(pos);
    const d = to.length();
    if (d < 0.001) continue;
    to.divideScalar(d);
    if (fwd.dot(to) >= Math.cos(halfAngle) && d < bestDist) { best = e; bestDist = d; }
  }
  return best;
}

function spawnRocket(from, fwd, weapon, accel, fromPlayer, target) {
  const mat = new THREE.MeshBasicMaterial({ color: weapon.projectileColor });
  const m = new THREE.Mesh(rocketGeo, mat);
  m.rotation.x = Math.PI / 2; // cone points along +Z
  const holder = new THREE.Group(); // to steer by heading around Y
  holder.add(m);
  holder.position.copy(from);
  scene.add(holder);
  // start direction - strictly along the ship's nose (without the ship's inertia)
  const vel = fwd.clone().multiplyScalar(weapon.launchSpeed);
  rockets.push({
    obj: holder, vel, accel, turnRate: weapon.turnRate,
    target, fromPlayer,
    damage: weapon.power, detonateR: weapon.detonateRadius,
    blastR: weapon.blastRadius, blastVis: weapon.blastVisual,
    hp: weapon.health ?? 1,                              // HP: reduced by bullet damage, shot down at 0
    traveled: 0, maxRange: weapon.maxRange ?? 120,       // self-destructs at max flight range
  });
}

// dealDamage=false - the rocket was shot down by gunfire (explosion without damage)
function detonateRocket(r, dealDamage = true) {
  if (dealDamage) {
    if (r.fromPlayer) {
      for (const e of enemies) {
        if (e.mesh.position.distanceTo(r.obj.position) <= r.blastR) e.hp -= r.damage;
      }
    } else if (player.alive && player.mesh.position.distanceTo(r.obj.position) <= r.blastR) {
      player.hp -= r.damage;
    }
  }
  spawnExplosion(r.obj.position, r.blastVis);
  scene.remove(r.obj);
  r.obj.children[0].material.dispose();
}

// Light rocket smoke trail: soft gray puffs (no glow, expand and fade away).
const smoke = [];
const smokeGeo = new THREE.SphereGeometry(1, 6, 6);
function spawnSmoke(pos) {
  const mat = new THREE.MeshBasicMaterial({
    color: 0x9aa6b4, transparent: true, opacity: 0.35, depthWrite: false, fog: false,
  });
  const m = new THREE.Mesh(smokeGeo, mat);
  m.position.copy(pos);
  m.scale.setScalar(0.4);
  scene.add(m);
  smoke.push({ mesh: m, life: 0.6, maxLife: 0.6 });
}

// Runtime catalog, populated from the DB in bootstrap() (bottom of the script). Pure derivation
// (deriveDrive / mass) still comes from components.js; the DATA (ships, weapons) comes from the API.
const CATALOG = {
  weapons: new Map(),   // id -> { id, name, type, ...stats }
  enemyShips: [],       // DB ship rows with type 'enemy' (spawn rules live in their stats)
};
const resolveWeapon = (id) => (id != null ? CATALOG.weapons.get(id) || null : null);

// ---------- Player (built from the player's active ship in bootstrap) ----------
let player = null;

// Resolve a ship's mounts (weapon ids -> weapon objects).
function buildMounts(mountDefs) {
  return (mountDefs || [])
    .map((m) => ({ weapon: resolveWeapon(m.weapon), group: m.group, offset: m.offset || 0, delay: m.delay || 0 }))
    .filter((m) => m.weapon);
}
// Group a ship's mounts into fire channels. A group has a player key and/or an enemy AI rule, its
// own cooldown (= the slowest mounted weapon's reload), and a `pending` queue for staggered volleys.
function buildGroups(groupDefs, mounts) {
  const groups = {};
  for (const [name, def] of Object.entries(groupDefs || {})) {
    const gm = mounts.filter((m) => m.group === name);
    const reload = gm.reduce((mx, m) => Math.max(mx, m.weapon.fireCooldown || 0), 0);
    groups[name] = { name, key: def.key, ai: def.ai || null, mounts: gm, reload, cooldown: 0, pending: [] };
  }
  return groups;
}

function buildPlayer(active) {
  const s = active.ship.stats;
  const p = {
    mesh: makeShip(s.color, modelSpec(active.ship.modelUrl)),
    vel: new THREE.Vector3(),
    heading: 0,                       // rotation angle around Y
    sizeScale: s.sizeScale || 1,
    hull: s.hull, engine: s.engine, thrusters: s.thrusters,
    mounts: buildMounts(active.loadout.mounts), // resolved weapons; also feeds ship mass
    hp: s.hull.durability, maxHp: s.hull.durability,
    alive: true,
  };
  p.groups = buildGroups(s.groups, p.mounts); // fire channels (gun / rocket / ...)
  deriveDrive(p); // acceleration <- engine power, turnRate <- thrusters, scaled by mass (incl. mounts)
  return p;
}

// ---------- Enemies ----------
const enemies = [];

// Build one enemy from a DB ship row (type 'enemy'); weapons + fire groups come from its stats.
function spawnEnemyShip(shipDef) {
  const s = shipDef.stats;
  const e = {
    role: s.role, color: s.color, sizeScale: s.sizeScale || 1,
    mesh: makeShip(s.color, modelSpec(shipDef.modelUrl)),
    vel: new THREE.Vector3(),
    heading: Math.random() * Math.PI * 2,
    hull: s.hull, engine: s.engine, thrusters: s.thrusters,
    mounts: buildMounts(s.mounts),
    hp: s.hull.durability,
    radius: 2.6 * (s.sizeScale || 1),  // hit radius scales with model size
    alive: true,
  };
  e.groups = buildGroups(s.groups, e.mounts);
  e.mesh.scale.multiplyScalar(s.sizeScale || 1); // bigger model for heavy enemies
  deriveDrive(e);
  // spawn in a ring around the player (just off-screen), not at the arena edges
  const ang = Math.random() * Math.PI * 2;
  const d = 70 + Math.random() * 60; // 70..130 from the player
  const lim = ARENA - 5;
  e.mesh.position.set(
    Math.max(-lim, Math.min(lim, player.mesh.position.x + Math.cos(ang) * d)),
    0.6,
    Math.max(-lim, Math.min(lim, player.mesh.position.z + Math.sin(ang) * d))
  );
  scene.add(e.mesh);
  enemies.push(e);
  return e;
}

// Spawn a specific enemy by role name (used by tests/tools), falling back to the first kind.
function spawnEnemy(role) {
  const def = CATALOG.enemyShips.find((s) => s.stats.role === role) || CATALOG.enemyShips[0];
  return def ? spawnEnemyShip(def) : null;
}

const TARGET_ENEMIES = 4;
// Data-driven spawn: pick among the enemy ships unlocked at the current score (score >=
// stats.unlockAfterKills), weighted by stats.spawnWeight. The mix lives in the DB, not here.
function spawnRandomEnemy() {
  const pool = CATALOG.enemyShips.filter((s) => score >= (s.stats.unlockAfterKills || 0));
  const list = pool.length ? pool : CATALOG.enemyShips;
  if (!list.length) return;
  const total = list.reduce((sum, s) => sum + (s.stats.spawnWeight || 1), 0);
  let r = Math.random() * total, pick = list[0];
  for (const s of list) { r -= (s.stats.spawnWeight || 1); if (r < 0) { pick = s; break; } }
  spawnEnemyShip(pick);
}

// ---------- Weapons: mounts fire in groups (a key for the player, an AI rule for enemies) ----------
const rightVec = (fwd) => new THREE.Vector3(fwd.z, 0, -fwd.x); // perpendicular to fwd, in the plane

// Fire one mount: spawn its projectile at the muzzle + lateral offset (side-by-side fire).
function fireMount(ship, mount, fwd, isPlayer) {
  const muzzle = ship.mesh.position.clone()
    .addScaledVector(fwd, 3)
    .addScaledVector(rightVec(fwd), mount.offset * (ship.sizeScale || 1));
  const w = mount.weapon;
  if (w.type === 'rocket') {
    const target = isPlayer ? findTargetInSector(muzzle, fwd, w.seekHalfAngle ?? Math.PI) : player;
    const accel = isPlayer ? ship.acceleration : (w.accel ?? ship.acceleration);
    spawnRocket(muzzle, fwd, w, accel, isPlayer, target);
  } else {
    spawnBullet(muzzle, fwd, w, isPlayer, ship.vel);
  }
}

// Advance a ship's fire groups: drain queued (staggered) volleys, and start a new volley when
// `wantsFire(group)` is true and the group is off cooldown. One trigger fires ALL the group's
// mounts, each after its own `delay` (so two launchers fire one after the other).
function updateGroups(ship, fwd, isPlayer, dt, wantsFire) {
  for (const g of Object.values(ship.groups)) {
    g.cooldown -= dt;
    for (let i = g.pending.length - 1; i >= 0; i--) {
      g.pending[i].t -= dt;
      if (g.pending[i].t <= 0) { fireMount(ship, g.pending[i].mount, fwd, isPlayer); g.pending.splice(i, 1); }
    }
    if (g.mounts.length && g.cooldown <= 0 && wantsFire(g)) {
      g.cooldown = g.reload + (isPlayer ? 0 : Math.random() * 0.5); // enemies stagger their reloads a bit
      for (const m of g.mounts) g.pending.push({ mount: m, t: m.delay });
    }
  }
}

// ---------- Input ----------
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
addEventListener('keyup', e => { keys[e.code] = false; });

// ---------- Touch controls (touch devices) ----------
// "steer by touch direction" model: stick angle = desired nose direction,
// the ship turns toward it; the magnitude of the deflection = thrust.
const touchAim = { active: false, heading: 0, thrust: 0 };
const isTouch = matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
if (isTouch) {
  document.getElementById('touch').classList.add('on');
  document.getElementById('help').style.display = 'none'; // keyboard hints not needed

  const zone = document.getElementById('stick-zone');
  const base = document.getElementById('stick-base');
  const knob = document.getElementById('stick-knob');
  const fire = document.getElementById('fire-btn');
  const R = 60;          // stick radius
  const DEAD = 0.2;      // dead zone (fraction of radius) - below it no steering/thrust
  let stickId = null;    // id of the touch holding the stick
  let stickCx = 0, stickCy = 0;

  function showStick(x, y) {
    base.style.left = knob.style.left = x + 'px';
    base.style.top = knob.style.top = y + 'px';
    base.style.display = knob.style.display = 'block';
  }
  function moveKnob(cx, cy, x, y) {
    const dx = x - cx, dy = y - cy;
    const len = Math.hypot(dx, dy);
    const clamped = Math.min(len, R);
    const kx = len > 0 ? dx / len * clamped : 0;
    const ky = len > 0 ? dy / len * clamped : 0;
    knob.style.left = (cx + kx) + 'px';
    knob.style.top = (cy + ky) + 'px';
    const mag = clamped / R; // 0..1
    if (mag > DEAD) {
      touchAim.active = true;
      // screen->world: x->X (right), y->Z (down). heading: forwardVec(h)=(sin h,0,cos h)
      touchAim.heading = Math.atan2(dx, dy);
      touchAim.thrust = (mag - DEAD) / (1 - DEAD); // 0..1 beyond the dead zone
    } else {
      touchAim.active = false; touchAim.thrust = 0;
    }
  }
  function clearStick() {
    stickId = null;
    touchAim.active = false; touchAim.thrust = 0;
    base.style.display = knob.style.display = 'none';
  }

  zone.addEventListener('touchstart', e => {
    if (stickId !== null) return;
    const t = e.changedTouches[0];
    stickId = t.identifier; stickCx = t.clientX; stickCy = t.clientY;
    showStick(stickCx, stickCy);
    moveKnob(stickCx, stickCy, t.clientX, t.clientY);
    e.preventDefault();
  }, { passive: false });
  zone.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === stickId) { moveKnob(stickCx, stickCy, t.clientX, t.clientY); e.preventDefault(); }
    }
  }, { passive: false });
  function endStick(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === stickId) clearStick();
    }
  }
  zone.addEventListener('touchend', endStick);
  zone.addEventListener('touchcancel', endStick);

  // fire button
  fire.addEventListener('touchstart', e => { keys['Space'] = true; e.preventDefault(); }, { passive: false });
  fire.addEventListener('touchend', e => { keys['Space'] = false; e.preventDefault(); }, { passive: false });
  fire.addEventListener('touchcancel', () => { keys['Space'] = false; });

  // rocket button
  const rocketBtn = document.getElementById('rocket-btn');
  rocketBtn.addEventListener('touchstart', e => { keys['_rocket'] = true; e.preventDefault(); }, { passive: false });
  rocketBtn.addEventListener('touchend', e => { keys['_rocket'] = false; e.preventDefault(); }, { passive: false });
  rocketBtn.addEventListener('touchcancel', () => { keys['_rocket'] = false; });
} else {
  // PC: the rocket circle is also clickable (besides the F key)
  const rocketBtn = document.getElementById('rocket-btn');
  rocketBtn.addEventListener('mousedown', () => { keys['_rocket'] = true; });
  addEventListener('mouseup', () => { keys['_rocket'] = false; });
}

// ---------- Backend: anonymous player identity + game history ----------
// Identify the player by a browser-generated id kept in localStorage (auto-register).
// All calls are best-effort: if the backend isn't running (e.g. opened via file://),
// they fail silently and the game still works. Served same-origin -> relative /api URLs.
const playerId = (() => {
  try {
    let id = localStorage.getItem('playerId');
    if (!id) { id = crypto.randomUUID(); localStorage.setItem('playerId', id); }
    return id;
  } catch { return null; }
})();
// (Registration happens in bootstrap() via the active-ship fetch, which upserts the player.)
function reportGame(score, durationMs) {
  if (!playerId) return;
  fetch('/api/games', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ playerId, score, kills: score, durationMs: Math.round(durationMs) }),
  }).catch(() => {});
}
let gameStartTime = performance.now();

// ---------- Helpers ----------
function forwardVec(heading) {
  // nose points in +Z when heading=0 (math lives in steering.js)
  const d = headingToDir(heading);
  return new THREE.Vector3(d.x, 0, d.z);
}
function clampToArena(pos) {
  const lim = ARENA - 2;
  pos.x = Math.max(-lim, Math.min(lim, pos.x));
  pos.z = Math.max(-lim, Math.min(lim, pos.z));
}

// ---------- HUD ----------
const elScore = document.getElementById('score');
const elEnemies = document.getElementById('enemies');
const elHp = document.getElementById('hpfill');
const elHpPct = document.getElementById('hppct');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub = document.getElementById('overlay-sub');
const elRocketBtn = document.getElementById('rocket-btn');
const elRocketFill = document.getElementById('rocket-fill');
let score = 0;

function updateHud() {
  elScore.textContent = score;
  elEnemies.textContent = enemies.length;
  const hpPct = Math.max(0, player.hp / player.maxHp * 100);
  elHp.style.width = hpPct + '%';
  elHpPct.textContent = hpPct.toFixed(1) + '%'; // remaining health, one decimal

  // rocket reload: the 🚀 circle fills up (radial) as the rocket group reloads
  const rg = player.groups.rocket;
  const cd = rg ? rg.reload : 1;
  const left = rg ? Math.max(0, rg.cooldown) : 0;
  const ready = left <= 0;
  const deg = Math.round((cd > 0 ? 1 - left / cd : 1) * 360);
  const col = ready ? '#77ee77' : '#ffaa55';
  elRocketFill.style.background = `conic-gradient(${col} ${deg}deg, rgba(120,90,60,.22) ${deg}deg)`;
  elRocketBtn.classList.toggle('ready', ready);
}

// ---------- Game loop ----------
// Thrust/turn/speed/weapon are now taken from the ship's components (engine/weapon).
const DRAG = 1.8;        // friction (enemies)
const IDLE_DRAG = 0.8;   // soft braking for the player when controls are released

const clock = new THREE.Clock();

function update(dt) {
  if (!player.alive) return;

  const eng = player.engine;         // main engine (for exhaust)
  const accel = player.acceleration; // derived: acceleration <- main engine power
  const turn = player.turnRate;      // derived: maneuverability <- thruster power

  // --- player: turn ---
  if (keys['KeyA'] || keys['ArrowLeft'])  player.heading += turn * dt;
  if (keys['KeyD'] || keys['ArrowRight']) player.heading -= turn * dt;

  // touch: turn the nose toward the touch direction (directional steering)
  if (touchAim.active) {
    player.heading = steerToward(player.heading, touchAim.heading, turn * dt);
  }

  // --- player: thrust ---
  const fwd = forwardVec(player.heading);
  if (keys['KeyW'] || keys['ArrowUp'])   player.vel.addScaledVector(fwd, accel * dt);
  if (keys['KeyS'] || keys['ArrowDown']) player.vel.addScaledVector(fwd, -accel * dt);
  if (touchAim.active) player.vel.addScaledVector(fwd, accel * touchAim.thrust * dt); // touch thrust

  // passive braking when no control button is pressed
  // (hold the turn to aim while drifting - inertia is preserved)
  const controlling = touchAim.active
                   || keys['KeyW'] || keys['ArrowUp'] || keys['KeyS'] || keys['ArrowDown']
                   || keys['KeyA'] || keys['ArrowLeft'] || keys['KeyD'] || keys['ArrowRight'];
  if (!controlling) player.vel.multiplyScalar(Math.max(0, 1 - IDLE_DRAG * dt));

  // pure inertia: no friction, no speed limit - the ship
  // keeps flying in its current direction, no matter where the nose points
  player.mesh.position.addScaledVector(player.vel, dt);

  // at the arena edges we simply stop: velocity along that axis goes to zero (no bounce)
  const lim = ARENA - 2;
  const p = player.mesh.position;
  if (p.x >  lim && player.vel.x > 0) { p.x =  lim; player.vel.x = 0; }
  if (p.x < -lim && player.vel.x < 0) { p.x = -lim; player.vel.x = 0; }
  if (p.z >  lim && player.vel.z > 0) { p.z =  lim; player.vel.z = 0; }
  if (p.z < -lim && player.vel.z < 0) { p.z = -lim; player.vel.z = 0; }

  player.mesh.rotation.y = player.heading;

  // --- engine trail (when thrusting forward) ---
  if (keys['KeyW'] || keys['ArrowUp'] || (touchAim.active && touchAim.thrust > 0.1)) {
    emitExhaust(player.mesh.position, fwd, player.vel, eng.exhaust);
  }

  // --- player: fire each group when its key is held (the rocket group also via the touch button) ---
  updateGroups(player, fwd, true, dt, (g) => !!(keys[g.key] || (g.name === 'rocket' && keys['_rocket'])));

  // --- enemy AI ---
  for (const e of enemies) {
    const toPlayer = player.mesh.position.clone().sub(e.mesh.position);
    const dist = toPlayer.length();
    toPlayer.normalize();

    // target angle toward the player
    const desired = Math.atan2(toPlayer.x, toPlayer.z);
    const diff = shortestAngleDelta(e.heading, desired); // used below for aim checks
    e.heading = steerToward(e.heading, desired, e.turnRate * dt);

    const ef = forwardVec(e.heading);
    // keep distance ~20: close in from afar, back off if too close
    const thrust = enemyThrustFactor(dist);
    e.vel.addScaledVector(ef, e.acceleration * thrust * dt);
    e.vel.multiplyScalar(Math.max(0, 1 - DRAG * dt));
    if (e.engine.maxSpeed && e.vel.length() > e.engine.maxSpeed) e.vel.setLength(e.engine.maxSpeed);

    e.mesh.position.addScaledVector(e.vel, dt);
    clampToArena(e.mesh.position);
    e.mesh.rotation.y = e.heading;

    // engine trail: same exhaust behavior as the player, when thrusting forward
    if (thrust > 0.1) emitExhaust(e.mesh.position, ef, e.vel, e.engine.exhaust, e.sizeScale || 1);

    // fire each group whose AI rule (range + aim tolerance) is satisfied
    updateGroups(e, ef, false, dt, (g) => g.ai && dist < g.ai.range && Math.abs(diff) < g.ai.aimTol);
  }

  // --- projectiles ---
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.traveled += b.vel.length() * dt;
    b.mesh.position.addScaledVector(b.vel, dt);

    let hit = false;
    if (b.fromPlayer) {
      for (const e of enemies) {
        if (b.mesh.position.distanceTo(e.mesh.position) < e.radius) {
          e.hp -= b.damage; hit = true; break;
        }
      }
    } else {
      if (player.mesh.position.distanceTo(b.mesh.position) < 2.6) {
        player.hp -= b.damage; hit = true;
      }
    }

    // interception: a bullet damages an opposite-side rocket; it's shot down when its hp runs out
    if (!hit) {
      for (let j = rockets.length - 1; j >= 0; j--) {
        const r = rockets[j];
        if (r.fromPlayer === b.fromPlayer) continue; // only rockets of the opposite side
        if (b.mesh.position.distanceTo(r.obj.position) < 2.4) {
          r.hp -= b.damage;
          if (r.hp <= 0) { detonateRocket(r, false); rockets.splice(j, 1); } // destroyed
          hit = true; break;                                                 // else it survives, takes another
        }
      }
    }

    const out = Math.abs(b.mesh.position.x) > ARENA || Math.abs(b.mesh.position.z) > ARENA;
    if (hit || b.traveled >= b.maxRange || out) {
      if (hit) spawnExplosion(b.mesh.position); // micro-flash at the impact point
      scene.remove(b.mesh);
      b.mesh.material.dispose();
      bullets.splice(i, 1);
    }
  }

  // --- rockets: homing (accelerate toward target), detonate near the enemy ---
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    // target lost: for a player rocket - if the enemy died; for an enemy one - if the player died
    if (r.target && (r.fromPlayer ? !enemies.includes(r.target) : !player.alive)) r.target = null;
    if (r.target) {
      // maneuver: turn the velocity vector toward the target (turnRate) + accelerate forward (accel)
      const to = r.target.mesh.position.clone().sub(r.obj.position);
      const desired = Math.atan2(to.x, to.z);
      const cur = steerToward(Math.atan2(r.vel.x, r.vel.z), desired, r.turnRate * dt);
      const speed = r.vel.length() + r.accel * dt;
      r.vel.set(Math.sin(cur) * speed, 0, Math.cos(cur) * speed);
    }
    r.traveled += r.vel.length() * dt;
    r.obj.position.addScaledVector(r.vel, dt);
    if (r.vel.lengthSq() > 0.01) r.obj.rotation.y = Math.atan2(r.vel.x, r.vel.z);
    spawnSmoke(r.obj.position); // light smoke trail

    let det = false;
    if (r.fromPlayer) {
      for (const e of enemies) {
        if (e.mesh.position.distanceTo(r.obj.position) <= Math.max(r.detonateR, e.radius)) { det = true; break; }
      }
    } else if (player.alive && player.mesh.position.distanceTo(r.obj.position) <= r.detonateR) {
      det = true;
    }
    const out = Math.abs(r.obj.position.x) > ARENA || Math.abs(r.obj.position.z) > ARENA;
    if (det || r.traveled >= r.maxRange) { detonateRocket(r); rockets.splice(i, 1); }
    else if (out) { scene.remove(r.obj); r.obj.children[0].material.dispose(); rockets.splice(i, 1); }
  }

  // --- micro-explosions (short fiery flash) ---
  for (let i = explosions.length - 1; i >= 0; i--) {
    const x = explosions[i];
    x.life -= dt;
    const t = 1 - Math.max(0, x.life) / x.maxLife; // 0 → 1
    x.mesh.scale.setScalar(0.6 + t * (x.maxScale - 0.6)); // expands quickly
    x.mesh.material.opacity = (1 - t);                  // and fades out
    if (x.life <= 0) {
      scene.remove(x.mesh);
      x.mesh.material.dispose();
      explosions.splice(i, 1);
    }
  }

  // --- engine trail: particles fly backward, fade out and shrink ---
  for (let i = trail.length - 1; i >= 0; i--) {
    const p = trail[i];
    p.mesh.position.addScaledVector(p.vel, dt);
    p.life -= dt;
    const t = 1 - Math.max(0, p.life) / p.maxLife; // 0 → 1
    p.mesh.material.opacity = (1 - t) * 0.85;
    p.mesh.scale.setScalar(p.baseSize * (1.1 - t * 0.8));
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.material.dispose();
      trail.splice(i, 1);
    }
  }

  // --- rocket smoke trail: puffs expand and fade away ---
  for (let i = smoke.length - 1; i >= 0; i--) {
    const s = smoke[i];
    s.life -= dt;
    const t = 1 - Math.max(0, s.life) / s.maxLife; // 0 → 1
    s.mesh.material.opacity = (1 - t) * 0.35;
    s.mesh.scale.setScalar(0.4 + t * 1.2); // smoke expands
    if (s.life <= 0) {
      scene.remove(s.mesh);
      s.mesh.material.dispose();
      smoke.splice(i, 1);
    }
  }

  // --- ship-explosion sparks: colored debris flying outward, slowing, fading + shrinking ---
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.mesh.position.addScaledVector(s.vel, dt);
    s.vel.multiplyScalar(1 - 2.5 * dt); // drag
    s.life -= dt;
    const t = 1 - Math.max(0, s.life) / s.maxLife; // 0 → 1
    s.mesh.material.opacity = 1 - t;
    s.mesh.scale.setScalar(s.size * (1 - t * 0.7));
    if (s.life <= 0) {
      scene.remove(s.mesh);
      s.mesh.material.dispose();
      sparks.splice(i, 1);
    }
  }

  // --- ship-explosion shockwave: a flat ring expanding outward on the plane ---
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const w = shockwaves[i];
    w.life -= dt;
    const t = 1 - Math.max(0, w.life) / w.maxLife; // 0 → 1
    w.mesh.scale.setScalar(1 + t * (w.maxScale - 1)); // expands fast
    w.mesh.material.opacity = (1 - t) * 0.9;          // and fades out
    if (w.life <= 0) {
      scene.remove(w.mesh);
      w.mesh.material.dispose();
      shockwaves.splice(i, 1);
    }
  }

  // --- enemy deaths ---
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (enemies[i].hp <= 0) {
      // colorful death burst: sized to the ship, tinted by its engine's exhaust color
      const e = enemies[i];
      spawnShipExplosion(e.mesh.position, e.engine.exhaust.color, e.sizeScale || 1);
      scene.remove(enemies[i].mesh);
      enemies.splice(i, 1);
      score++;
    }
  }
  // maintain the enemy count
  while (enemies.length < TARGET_ENEMIES) spawnRandomEnemy();

  // --- player death ---
  if (player.hp <= 0 && player.alive) {
    player.alive = false;
    spawnShipExplosion(player.mesh.position, player.engine.exhaust.color, 1); // tinted by engine exhaust
    reportGame(score, performance.now() - gameStartTime); // save game to history
    overlayTitle.textContent = 'Ship destroyed';
    overlaySub.textContent = `Ships destroyed: ${score}`;
    overlay.style.display = 'flex';
  }

  // --- camera: rigidly attached to the player (no lag or "floating" - no jitter),
  //     fixed angle - does NOT rotate with the ship's turn ---
  camera.position.copy(player.mesh.position).add(CAM_OFFSET);
  camera.lookAt(player.mesh.position);

  // stars - an infinitely distant backdrop (stuck to the camera, no parallax)
  stars.position.copy(camera.position);
  // the planet shifts slightly as the player moves - a light parallax (depth)
  const PARALLAX = 0.6;
  sky.position.copy(camera.position).addScaledVector(player.mesh.position, -PARALLAX);

  // moons orbit the planet (they do not rotate themselves - the terminator does not "wander")
  updateMoons(dt);
}

// ---------- Perf overlay (load) ----------
const elPerf = document.getElementById('perf');
let perfAccum = 0, perfFrames = 0, perfFps = 0;
function updatePerf(dt) {
  perfAccum += dt; perfFrames++;
  if (perfAccum >= 0.4) { // update ~2.5 times per sec
    perfFps = Math.round(perfFrames / perfAccum);
    const r = renderer.info.render;
    const tris = r.triangles >= 1e6
      ? (r.triangles / 1e6).toFixed(2) + 'M'
      : Math.round(r.triangles / 1e3) + 'k';
    const ms = (perfAccum / perfFrames * 1000).toFixed(1);
    elPerf.textContent = `FPS ${perfFps} · ${ms}ms · draw ${r.calls} · tris ${tris}`;
    perfAccum = 0; perfFrames = 0;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  updateHud();
  // two passes: first the sky backdrop (with its own light), then combat on top
  renderer.info.reset();
  renderer.clear();
  renderer.render(skyScene, camera);
  renderer.clearDepth();
  renderer.render(scene, camera);
  updatePerf(dt);
}

// ---------- Restart ----------
function reset() {
  for (const b of bullets) { scene.remove(b.mesh); b.mesh.material.dispose(); }
  bullets.length = 0;
  for (const x of explosions) { scene.remove(x.mesh); x.mesh.material.dispose(); }
  explosions.length = 0;
  for (const p of trail) { scene.remove(p.mesh); p.mesh.material.dispose(); }
  trail.length = 0;
  for (const r of rockets) { scene.remove(r.obj); r.obj.children[0].material.dispose(); }
  rockets.length = 0;
  for (const s of smoke) { scene.remove(s.mesh); s.mesh.material.dispose(); }
  smoke.length = 0;
  for (const s of sparks) { scene.remove(s.mesh); s.mesh.material.dispose(); }
  sparks.length = 0;
  for (const w of shockwaves) { scene.remove(w.mesh); w.mesh.material.dispose(); }
  shockwaves.length = 0;
  for (const e of enemies) scene.remove(e.mesh);
  enemies.length = 0;
  player.mesh.position.set(0, 0.6, 0);
  player.vel.set(0, 0, 0);
  player.heading = 0;
  player.hp = player.maxHp;
  for (const g of Object.values(player.groups)) { g.cooldown = 0; g.pending.length = 0; } // reset fire groups
  player.alive = true;
  score = 0;
  gameStartTime = performance.now(); // start timing a new game (for history)
  for (let i = 0; i < TARGET_ENEMIES; i++) spawnRandomEnemy();
  overlay.style.display = 'none';
}
document.getElementById('restart').addEventListener('click', reset);

// Test/inspection hook for the headless visual tests (client/visual/). Inert during normal
// play — only attached when the page is opened with `?debug`. It exposes simulation internals
// so a scenario can seed entities and assert on state (counts, colors) instead of diffing pixels.
if (location.search.includes('debug')) {
  window.__game = {
    scene, enemies, bullets, rockets,
    explosions, sparks, shockwaves, trail, smoke,
    spawnEnemy, spawnRandomEnemy, spawnShipExplosion, emitExhaust, reset,
    get player() { return player; },   // built asynchronously in bootstrap()
    get catalog() { return CATALOG; }, // ships/weapons loaded from the DB
    get score() { return score; },
  };
}

addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Bootstrap: build the world from the DB, then start ----------
// Fetch the ship/weapon catalog and the player's active ship from the API, build the runtime
// catalog + the player, then start the game. Served same-origin, so the API is always available.
const fetchJson = async (url) => {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} -> ${r.status}`);
  return r.json();
};

async function bootstrap() {
  try {
    const [weapons, ships] = await Promise.all([fetchJson('/api/weapons'), fetchJson('/api/ships')]);
    for (const w of weapons) CATALOG.weapons.set(w.id, { id: w.id, name: w.name, type: w.type, ...w.stats });
    CATALOG.enemyShips = ships.filter((s) => s.type === 'enemy');

    // the player's active ship (auto-registers); fall back to the player-type template if needed
    let active = null;
    if (playerId) active = await fetchJson(`/api/players/${playerId}/active-ship`).catch(() => null);
    if (!active) {
      const t = ships.find((s) => s.type === 'player');
      active = { ship: t, loadout: { weapon: t.stats.weapon, secondary: t.stats.secondary } };
    }

    player = buildPlayer(active);
    scene.add(player.mesh);
    reset();   // position the player + spawn the initial enemies (from the catalog)
    animate(); // start the render/update loop
  } catch (err) {
    console.error('Failed to load the game catalog from the API:', err);
  }
}
bootstrap();
</script>
